id: https://w3id.org/NFDI4Chem/ms-dcat-ap
name: ms-dcat-ap
title: ms-dcat-ap
description: |
  A DCAT-AP profile for mass spectrometry (MS) implementing MIChI recommendations.
license: MIT
see_also:
  - https://NFDI4Chem.github.io/ms-dcat-ap
prefixes:
  linkml: https://w3id.org/linkml/
  MS: http://purl.obolibrary.org/obo/MS_
  material_entities_ap: https://w3id.org/nfdi-de/dcat-ap-plus/materials/
  dcatapplus: https://w3id.org/nfdi-de/dcat-ap-plus/
  #chemdcatap: https://w3id.org/nfdi-de/dcat-ap-plus/chemistry/
  dcat: http://www.w3.org/ns/dcat#
  CHMO: http://purl.obolibrary.org/obo/CHMO_
  OBI: http://purl.obolibrary.org/obo/OBI_

imports:
  - linkml:types
  - chem_dcat_ap
  - material_entities_ap
  - dcatapplus:latest/schema/dcat_ap_plus

classes:
  MSSample:
    abstract: true
    mixin: true
    slots:
      - solvent
      - injection_volume

  SubstanceMSSample:
    is_a: SubstanceSample
    class_uri: MS:1000457
    mixins:
      - MSSample
    description: >
      A mass spectrometry sample of known composition (substance)
      prepared for and investigated by Mass Spectrometry (MS).
    slot_usage:
      composed_of:
        description: >
          Analysed Compound : A compound analysed in an mass spectrometry (MS)
          sample using data acquired from an mass spectrometry (MS) analysis.
        required: true
      has_concentration:
        description: >
          The concentration of the compound analysed in a mass spectrometry (MS)
          sample using data acquired from a mass spectrometry (MS) analysis
        recommended: true

  MaterialMSSample:
    is_a: MaterialSample
    class_uri: MS:1000457
    mixins:
      - MSSample
    description: >
      A mass spectrometry sample of unknown composition (material) prepared for and
      investigated by Mass Spectrometry (MS).
    slot_usage:
      id:
        description: >
          Sample ID: The URI identifying a sample and leading to the sample history including its preparation.
        required: true

slots:
  solvent:
    description: >
      A solvent used in liquid mass spectrometry (MS) for sample preparation.
    range: ChemicalEntity
    required: true
  injection_volume:
    description: >
      The volume of liquid sample injected into the mass spectrometer for analysis.
    range: Volume
    required: true



