id: https://w3id.org/NFDI4Chem/ms-dcat-ap
name: ms-dcat-ap
title: ms-dcat-ap
description: |
  A DCAT-AP profile for mass spectrometry (MS) implementing MIChI recommendations.
license: MIT
see_also:
  - https://NFDI4Chem.github.io/ms-dcat-ap
prefixes:
  linkml: https://w3id.org/linkml/
  MS: http://purl.obolibrary.org/obo/MS_
  material_entities_ap: https://w3id.org/nfdi-de/dcat-ap-plus/materials/
  dcatapplus: https://w3id.org/nfdi-de/dcat-ap-plus/
  #chemdcatap: https://w3id.org/nfdi-de/dcat-ap-plus/chemistry/
  dcat: http://www.w3.org/ns/dcat#
  CHMO: http://purl.obolibrary.org/obo/CHMO_
  OBI: http://purl.obolibrary.org/obo/OBI_

imports:
  - linkml:types
  - chem_dcat_ap
  - material_entities_ap
  - dcatapplus:latest/schema/dcat_ap_plus

classes:
  MSSample:
    abstract: true
    is_a: MaterialSample
    description: >
      Abstract base class for mass spectrometry samples, providing common
      slots such as solvent and injection volume. Concrete subclasses are
      SubstanceMSSample (known composition) and MaterialMSSample (unknown
      composition).
    attributes:
      solvent:
        description: >
          A solvent used in liquid mass spectrometry (MS) for sample preparation.
        range: ChemicalEntity
        required: true
      injection_volume:
        description: >
          The volume of liquid sample injected into the mass spectrometer for analysis.
        range: Volume
        required: true

  SubstanceMSSample:
    is_a: MSSample
    mixins:
      - SubstanceSample
    class_uri: MS:1000457
    description: >
      A mass spectrometry sample of known composition (substance)
      prepared for and investigated by Mass Spectrometry (MS).
    slot_usage:
      composed_of:
        description: >
          Analysed Compound : A compound analysed in an mass spectrometry (MS)
          sample using data acquired from an mass spectrometry (MS) analysis.
        required: true
      has_concentration:
        description: >
          The concentration of the compound analysed in a mass spectrometry (MS)
          sample using data acquired from a mass spectrometry (MS) analysis
        recommended: true

  MaterialMSSample:
    is_a: MSSample
    class_uri: MS:1000457
    description: >
      A mass spectrometry sample of unknown composition (material) prepared for and
      investigated by Mass Spectrometry (MS).
    slot_usage:
      id:
        description: >
          Sample ID: The URI identifying a sample and leading to the sample history including its preparation.
        required: true

  MassSpectrometer:
    is_a: Device
    class_uri: CHMO:0000982
    description: >
      A mass spectrometer used for the analysis of samples in mass spectrometry (MS).
    attributes:
      manufacturer:
        is_a: has_qualitative_attribute
        description: The manufacturer of the mass spectrometer.
        range: Manufacturer
        required: true
      model:
        is_a: has_qualitative_attribute
        description: The model designation of the mass spectrometer.
        range: Model
        required: true
      mass_analyzer_type:
        is_a: has_qualitative_attribute
        description: The type of mass analyzer used in the mass spectrometer.
        range: MassAnalyzerType
        required: true
      ionization_type:
        is_a: has_qualitative_attribute
        description: The type of ionization used in the mass spectrometer.
        range: IonizationType
        required: true
      detector_type:
        is_a: has_qualitative_attribute
        description: The type of detector used in the mass spectrometer.
        range: DetectorType
        required: false

  Manufacturer:
    is_a: QualitativeAttribute
    class_uri: MS:1000031
    description: A manufacturer that produces MS instruments and/or their parts
    slot_usage:
      value:
        range: string
        required: true
  Model:
    is_a: QualitativeAttribute
    class_uri: MS:1000031
    description: Instrument model name not including the vendor's name.
    slot_usage:
      value:
        range: string
        required: true
  MassAnalyzerType:
    is_a: QualitativeAttribute
    class_uri: MS:1000443
    description: Type of mass analyzer used in a mass spectrometer (e.g. quadrupole, time-of-flight, etc.)
    slot_usage:
      value:
        range: string
        required: true
  IonizationType:
    is_a: QualitativeAttribute
    class_uri: MS:1000008
    description: Type of ionization used in a mass spectrometer (e.g. ESI, MALDI, etc.)
    slot_usage:
      value:
        range: string
        required: true
  DetectorType:
    is_a: QualitativeAttribute
    class_uri: MS:1000026
    description: Type of detector used in a mass spectrometer (e.g. electron multiplier, microchannel plate).
    slot_usage:
      value:
        range: string
        required: true

  MSSampleMeasurementDataset:
    is_a: Dataset
    class_uri: dcat:Dataset
    description: >
      A dataset that is the result of a measurement of a MSSample using a MassSpectrometer.
    slot_usage:
      was_generated_by:
        range: MassSpectrometry
        required: true
      is_about_entity:
        range: MSSample
        required: true

  MassSpectrometry:
    is_a: DataGeneratingActivity
    description: >
      A mass spectrometry (MS) assay for the analysis of samples using a mass spectrometer.
    attributes:
      acquisition_mode:
        is_a: has_qualitative_attribute
        description: The acquisition mode used during the mass spectrometry measurement.
        range: AcquisitionMode
        required: true
      scan_polarity:
        is_a: has_qualitative_attribute
        description: The scan polarity used during the mass spectrometry measurement.
        range: ScanPolarity
        required: true
      scan_window_lower_limit:
        is_a: has_quantitative_attribute
        description: The lower limit of the scan window used during the measurement, typically expressed in m/z.
        range: ScanWindowLowerLimit
        required: true
      scan_window_upper_limit:
        is_a: has_quantitative_attribute
        description: The upper limit of the scan window used during the measurement, typically expressed in m/z.
        range: ScanWindowUpperLimit
        required: true
    slot_usage:
      carried_out_by:
        range: MassSpectrometer
        required: true
      evaluated_entity:
        range: MSSample
        required: true

  AcquisitionMode:
    is_a: QualitativeAttribute
    description: >
      The instrument setting specifying how to collect data determining which ions
      are detected, whether and how they are being fragmented and how their signals
      are recorded.
    slot_usage:
      value:
        range: string
        required: true
  ScanPolarity:
    is_a: QualitativeAttribute
    class_uri: MS:1000465
    description: Scan polarity.
    slot_usage:
      value:
        range: ScanPolarityEnum
        required: true
  ScanWindowLowerLimit:
    is_a: QuantitativeAttribute
    class_uri: MS:1000501
    description: Scan window lower limit (MS:1000501), typically expressed in m/z.
  ScanWindowUpperLimit:
    is_a: QuantitativeAttribute
    class_uri: MS:1000500
    description: Scan window upper limit (MS:1000500), typically expressed in m/z.


enums:
  ScanPolarityEnum:
    description: >
      Polarity of a mass spectrometry scan: either positive or negative ion mode.
    permissible_values:
      negative_scan:
        text: negative_scan
        description: Negative ion mode scan.
        meaning: MS:1000129
      positive_scan:
        text: positive_scan
        description: Positive ion mode scan.
        meaning: MS:1000130
